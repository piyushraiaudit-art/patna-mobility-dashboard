[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#dc2626"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f3f4f6"
textColor = "#111827"
font = "sans serif"

[server]
# headless must be true on Streamlit Cloud (no display).
# run_dashboard.sh passes --server.headless false explicitly for local dev,
# which overrides this setting.
headless = true
